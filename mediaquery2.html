<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #container{
            background-color: aqua;
            width:500px;
            border:2px solid black;
            display:flex;
            padding:5px;
            margin:5px;
        }
        #leftcon{
            height:200px;
            width:200px;
            background-color: blueviolet;
             border:2px solid black;
             padding:5px;
            margin:5px;
        }
        #rightcon{
            height:200px;
            width:200px;
            background-color: green;
             border:2px solid black;
             padding:5px;
            margin:5px;
        }
        .para{
            height:18px;
             border:2px solid black;
             background-color: antiquewhite;
        }
        @media(max-width:640px){
            #container{
            flex-direction:column;
            }
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="leftcon">
            <p class="para">Text1</p>
            <p class="para">Text2</p>
        </div>
        <div id="rightcon">
            <img src="nature.jpeg" alt="image" height="150px" width="150px">
        </div>
    </div>
</body>
</html>
